services:
  - type: web
    name: microservicio
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: MODEL_PROVIDER
        value: torch
      - key: MODEL_PATH
        value: models/best_mobile.pt
